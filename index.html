<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Assemblage SolidWorks en 3D</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        /* Style de la visionneuse */
        model-viewer {
            width: 80%;
            height: 600px;
            background-color: #f4f4f4;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="https://Mayt92.github.io/Portfolio/TK_nouveau.glb"
        alt="Un assemblage 3D provenant de SolidWorks" 
        auto-rotate 
        camera-controls 
        shadow-intensity="1" 
        ar>
    </model-viewer>

    <p>Utilisez la souris pour pivoter et la molette pour zoomer.</p>

</body>
</html>
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualiseur 3D</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        /* On retire les marges et on occupe tout l'écran */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff; /* Fond blanc pur */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        model-viewer {
            width: 100vw;
            height: 100vh;
            outline: none;
            /* Rendu de haute qualité */
            --poster-color: transparent;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="https://Mayt92.github.io/Portfolio/TK_nouveau.glb" 
        alt="Assemblage SolidWorks TK_nouveau"
        camera-controls 
        auto-rotate 
        shadow-intensity="1.5" 
        shadow-softness="1"
        exposure="1.2"
        environment-image="neutral"
        interpolation-decay="200"
        interaction-prompt="none"
        ar>
    </model-viewer>

</body>
</html>
