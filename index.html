<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Modèle 3D Tortank</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: transparent; /* optionnel, si tu veux voir le fond de ton site derrière /
    }
    model-viewer {
      width: 600px;
      height: 600px;
      background-color: transparent; / fond transparent du viewer */
    }
  </style>
</head>
<body>
  <model-viewer
    src="https://Mayt92.github.io/Portfolio/TK-ASS_TORTANK_V2.glb"
    alt="Modèle 3D du robot marcheur"
    auto-rotate
    camera-controls
    ar
    background-color="transparent">
  </model-viewer>
</body>
</html>





<!DOCTYPE html>
<html lang="en">
<head>
  <title>3D Model Viewer with Text</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: transparent; /* Fond transparent */
    }
    #container {
      position: relative;
      width: 100%;
      height:400px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    #background-text {
      position: absolute;
      font-size: 5rem; /* Taille encore plus grande */
      font-weight: bold;
      font-family: "Monaco", monospace;
      color: #178582; /* Bleu transparent */
      bottom: 40%; /* Descend le texte vers le bas */
      z-index: 1;
      pointer-events: none; /* Empêche d'interférer avec les interactions du modèle */
    }
    model-viewer {
      width: 100%;
      height: 100%;
      z-index: 2; /* Place le modèle devant */
    }
  </style>
</head>
<body>
  <div id="container">
    <!-- Texte en arrière-plan -->
    <div id="background-text"></div>
    <!-- Modèle 3D -->
    <model-viewer 
      src="https://Mayt92.github.io/Portfolio/TK-ASS_TORTANK_V2.glb"
      alt="Robot TK" 
      camera-controls 
      auto-rotate 
      shadow-intensity="1" 
      style="background-color: transparent;">
    </model-viewer>
  </div>
</body>
</html>
