<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualiseur 3D Pro</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        model-viewer {
            width: 100vw;
            height: 100vh;
            outline: none;
            /* Animation de transition */
            --poster-color: transparent;
        }

        /* Style optionnel pour un indicateur de chargement circulaire */
        #lazy-load-poster {
            position: absolute;
            left: 0; right: 0; top: 0; bottom: 0;
            background-image: url("TK_image.png"); /* REMPLACEZ PAR VOTRE IMAGE */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="https://Mayt92.github.io/Portfolio/TK_nouveau.glb" 
        poster="TK_image.png"
        alt="Assemblage SolidWorks TK_nouveau"
        camera-controls 
        auto-rotate 
        shadow-intensity="1.5" 
        exposure="1.2"
        environment-image="neutral"
        reveal="auto"
        loading="lazy"
        ar>
        
        <div slot="poster" id="lazy-load-poster"></div>
        
    </model-viewer>

</body>
</html>
