<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Projet SolidWorks</title>
    <style>
        /* Mise en page plein écran centrée */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff; /* Fond blanc propre */
            overflow: hidden;
        }

        .image-container {
            width: 90%;
            max-width: 1000px;
            text-align: center;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 12px; /* Coins arrondis */
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); /* Ombre portée réaliste */
            transition: transform 0.3s ease;
        }

        /* Petit effet de survol */
        img:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="https://Mayt92.github.io/Portfolio/PRIX 1.avif" 
            alt="Rendu de l'assemblage SolidWorks">
    </div>

</body>
</html>
